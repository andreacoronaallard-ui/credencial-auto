<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Seguro Auto" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1F2A23" />

  <link rel="icon" href="https://credencial.tactika.mx/assets/logo-tactikatik.png" />
  <link rel="apple-touch-icon" href="https://credencial.tactika.mx/assets/logo-tactikatik.png" />

  <title>Credencial Seguro Auto</title>

  <meta property="og:title" content="Credencial Seguro Auto" />
  <meta property="og:description" content="Accede a tu credencial digital de seguro de auto con Tactika." />
  <meta property="og:image" content="https://credencial.tactika.mx/preview-tactika-auto.jpg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://credencial.tactika.mx/auto/" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Credencial Seguro Auto" />
  <meta name="twitter:description" content="Accede a tu credencial digital de seguro de auto con Tactika." />
  <meta name="twitter:image" content="https://credencial.tactika.mx/preview-tactika-auto.jpg" />

  <style>
    :root {
      --bg: #eef0ea;
      --green-deep: #2C3228;
      --green: #4A5E4A;
      --green-soft: #647564;
      --beige: #F0EADA;
      --beige-warm: #E8E0CC;
      --text-dark: #243026;
      --white: #ffffff;
      --gris: #ADA899;
      --gris-light: #C8C2B4;
      --accent: #6fcf97;
      --danger: #D94E4E;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.45), transparent 35%),
        linear-gradient(180deg, #eef1eb 0%, #dfe5dd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 12px max(18px, env(safe-area-inset-bottom));
      color: var(--text-dark);
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .phone {
      width: 100%;
      max-width: 420px;
    }

    /* ── Card shell ── */
    .card {
      display: none;
      animation: fadeIn .4s ease;
    }

    .card-wrap {
      background: var(--beige);
      border-radius: 16px;
      padding: 20px 14px 16px;
    }

    .notch {
      width: 64px;
      height: 5px;
      background: var(--gris-light);
      border-radius: 4px;
      margin: 0 auto 14px;
      opacity: .45;
    }

    /* ── Dark inner card ── */
    .dark-card {
      border-radius: 14px;
      background: var(--green-deep);
      padding: 20px 20px 18px;
      color: var(--beige);
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .dark-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 140px; height: 140px;
      border-radius: 50%;
      background: rgba(74,94,74,.12);
      transform: translate(30%, -30%);
      pointer-events: none;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 1;
    }

    .brand-logo {
      height: 30px;
      opacity: .9;
    }

    .plan-badge {
      font-size: 10px;
      font-weight: 700;
      background: rgba(74,94,74,.45);
      padding: 3px 12px;
      border-radius: 20px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--beige);
    }

    .policy-section {
      margin-top: 16px;
    }

    .label-tiny {
      font-size: 9px;
      opacity: .4;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .policy-number {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 3px;
      margin-top: 2px;
      font-variant-numeric: tabular-nums;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .detail-label {
      font-size: 9px;
      opacity: .4;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .detail-value {
      font-size: 13px;
      font-weight: 500;
      margin-top: 2px;
    }

    .vehicle-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 14px;
    }

    .vehicle-name {
      font-weight: 700;
      font-size: 15px;
    }

    .vehicle-detail {
      font-size: 12px;
      opacity: .65;
    }

    .status-badge {
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      display: inline-block;
      animation: pulse 2s infinite;
    }

    /* ── Insurer chip ── */
    .insurer-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(255,255,255,.06);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,.08);
    }

.insurer-logo {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: transparent;
  object-fit: contain;
  flex-shrink: 0;
    }

    .insurer-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--beige);
    }

    .insurer-sub {
      font-size: 10px;
      opacity: .5;
      margin-top: 1px;
    }

    /* ── Buttons ── */
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 14px;
    }

    .btn {
      appearance: none;
      border: 0;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      min-height: 52px;
      padding: 14px 18px;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform .16s ease, opacity .16s ease;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-call {
      background: var(--danger);
      color: #fff;
      box-shadow: 0 6px 16px rgba(217,78,78,.3);
    }

    .btn-pdf {
      background: var(--beige);
      color: var(--green-deep);
      border: 1.5px solid rgba(0,0,0,.06);
    }

    .btn-whatsapp {
      background: var(--green-deep);
      color: var(--beige);
      border: 1.5px solid rgba(255,255,255,.1);
    }

    .btn-wallet {
      padding: 6px 0;
      background: transparent;
      min-height: auto;
      border: 0;
    }

    .btn-wallet img {
      height: 58px;
      width: auto;
      max-width: 100%;
      display: block;
      margin: 0 auto;
    }

    /* ── Tactika footer ── */
    .tactika-footer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 16px;
      opacity: .35;
      transition: opacity .2s;
    }

    .tactika-footer:hover { opacity: .55; }

    .tactika-footer img {
      height: 16px;
    }

    .tactika-footer span {
      font-size: 10px;
      color: var(--gris);
      letter-spacing: .5px;
      font-weight: 600;
    }

    /* ── Loading message ── */
    .message {
      padding: 42px 24px;
      text-align: center;
      font-size: 18px;
      color: var(--green-deep);
      background: rgba(255,255,255,.72);
      border-radius: 24px;
    }

    /* ── PDF viewer ── */
    .pdf-viewer {
      display: none;
      background: #ffffff;
      color: #111;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 45px rgba(24,33,27,.16);
      border: 1px solid rgba(0,0,0,.06);
    }

    .pdf-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px 18px;
      background: var(--green-deep);
      color: var(--beige);
    }

    .pdf-title { font-size: 16px; font-weight: 700; }

    .pdf-actions { display: flex; gap: 8px; }

    .pdf-btn {
      appearance: none;
      border: 0;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      font-family: inherit;
    }

    .pdf-btn-open {
      background: #fff;
      color: var(--green-deep);
    }

    .pdf-btn-close {
      background: rgba(255,255,255,.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,.16);
    }

    .pdf-frame-wrap {
      height: calc(100vh - 160px);
      min-height: 620px;
      background: #f5f5f5;
    }

    .pdf-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    /* ── Responsive ── */
    @media (max-width: 380px) {
      .policy-number { font-size: 20px; letter-spacing: 2px; }
      .vehicle-name { font-size: 13px; }
      .btn { font-size: 14px; min-height: 48px; }
      .btn-wallet img { height: 52px; }
    }
  </style>
</head>
<body>

  <div class="phone">

    <div class="message" id="message">Cargando credencial...</div>

    <div class="card" id="card">
      <div class="card-wrap">
        <div class="notch"></div>

        <!-- ── Dark card ── -->
        <div class="dark-card">
          <div>
            <div class="card-header">
              <img class="brand-logo" src="https://credencial.tactika.mx/logo-tactikatikbeige.png" alt="Tactika" />
              <div class="plan-badge">Seguro Auto</div>
            </div>

            <div class="policy-section">
              <div class="label-tiny">No. de póliza</div>
              <div class="policy-number" id="poliza"></div>
            </div>
          </div>

          <div>
            <div class="details-grid">
              <div>
                <div class="detail-label">Vigencia</div>
                <div class="detail-value" id="vigencia"></div>
              </div>
              <div>
                <div class="detail-label">Contratante</div>
                <div class="detail-value" id="contratante"></div>
              </div>
            </div>

              <div class="vehicle-row">
              <div>
                <div class="vehicle-name" id="vehiculo"></div>
                <div class="vehicle-detail" id="vehiculoDetalle"></div>
              </div>
              <div class="status-badge">
                <span class="status-dot"></span>
                Vigente
              </div>
            </div>

            <!-- Insurer chip -->
            <div class="insurer-chip">
              <img class="insurer-logo" id="insurerLogo" src="" alt="" />
              <div>
                <div class="insurer-name" id="insurerName"></div>
                <div class="insurer-sub" id="insurerSub"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- ── Buttons ── -->
        <div class="buttons">
          <a class="btn btn-call" id="btnTelefono" href="#">📞 Llamar a siniestros</a>
          <button class="btn btn-pdf" id="btnPdf" type="button">📄 Ver póliza completa</button>
          <a class="btn btn-whatsapp" href="https://wa.me/message/HWHNU3PT7TYXG1" target="_blank" rel="noopener noreferrer">💬 Contacta a tu agente</a>
          <a class="btn btn-wallet" id="btnGoogleWallet" target="_blank" rel="noopener noreferrer">
            <img src="/assets/es419_add_to_google_wallet_wallet-button.svg" alt="Agregar a Google Wallet" />
          </a>
        </div>
      </div>

      <!-- Tactika footer -->
      <div class="tactika-footer">
        <img src="https://credencial.tactika.mx/assets/logo-tactikatik.png" alt="Tactika" />
        <span>Credencial digital por Tactika</span>
      </div>
    </div>

    <!-- ── PDF viewer ── -->
    <div class="pdf-viewer" id="pdfViewer">
      <div class="pdf-header">
        <div class="pdf-title">Póliza completa</div>
        <div class="pdf-actions">
          <a class="pdf-btn pdf-btn-open" id="pdfOpenNew" href="#" target="_blank" rel="noopener noreferrer">Abrir aparte</a>
          <button class="pdf-btn pdf-btn-close" id="pdfClose" type="button">Cerrar</button>
        </div>
      </div>
      <div class="pdf-frame-wrap">
        <iframe class="pdf-frame" id="pdfFrame" src=""></iframe>
      </div>
    </div>

  </div>

  <script>
    async function cargarCredencial() {
      const params = new URLSearchParams(window.location.search);
      const codigo = params.get("c");

      const message = document.getElementById("message");
      const card = document.getElementById("card");
      const pdfViewer = document.getElementById("pdfViewer");
      const btnPdf = document.getElementById("btnPdf");
      const pdfFrame = document.getElementById("pdfFrame");
      const pdfOpenNew = document.getElementById("pdfOpenNew");
      const pdfClose = document.getElementById("pdfClose");
      const btnTelefono = document.getElementById("btnTelefono");
      const btnGoogleWallet = document.getElementById("btnGoogleWallet");

      if (!codigo) {
        message.innerHTML = "No se encontró código de credencial.";
        return;
      }

      try {
        const [respPolizas, respAseguradoras] = await Promise.all([
          fetch("https://credencial.tactika.mx/data/auto.json"),
          fetch("https://credencial.tactika.mx/data/aseguradoras-auto.json")
        ]);

        if (!respPolizas.ok) throw new Error("No se pudo leer auto.json");
        if (!respAseguradoras.ok) throw new Error("No se pudo leer aseguradoras-auto.json");

        const polizas = await respPolizas.json();
        const aseguradoras = await respAseguradoras.json();

        const poliza = polizas[codigo];
        if (!poliza) {
          message.innerHTML = "Credencial no encontrada.";
          return;
        }

        const aseguradora = aseguradoras[poliza.aseguradora_id];
        if (!aseguradora) {
          message.innerHTML = "Aseguradora no configurada.";
          return;
        }

        // Fill card data
        document.getElementById("poliza").innerText = poliza.poliza || "";
        document.getElementById("vigencia").innerText = poliza.vigencia_texto || "";
        document.getElementById("contratante").innerText = poliza.contratante || "";
        document.getElementById("vehiculo").innerText = poliza.vehiculo || "";

        // Vehicle detail: color + serie
        const color = (poliza.color || "").trim();
        const serie = poliza.serie || "";
        const detailParts = [];
        if (color) detailParts.push(color);
        if (serie) detailParts.push("Serie: " + serie);
        document.getElementById("vehiculoDetalle").innerText = detailParts.join(" · ");

        // Insurer info
        document.getElementById("insurerLogo").src = aseguradora.logo || "";
        document.getElementById("insurerLogo").alt = aseguradora.nombre || "";
        document.getElementById("insurerName").innerText = aseguradora.nombre || "";
        document.getElementById("insurerSub").innerText = "Aseguradora";

        // Phone button
        btnTelefono.href = "tel:" + (aseguradora.telefonolink || "");
        btnTelefono.innerText = "📞 Llamar a siniestros · " + (aseguradora.telefono_siniestros || "");

        // Google Wallet
        const walletUrl = "https://tactika-wallet-api.vercel.app/api/wallet/auto/" + poliza.id;
        if (btnGoogleWallet) {
          btnGoogleWallet.href = walletUrl;
        }

        // PDF
        const pdfLink = poliza.pdf_url || "";
        if (pdfLink) {
          pdfOpenNew.href = pdfLink;
          btnPdf.onclick = function () {
            pdfFrame.src = pdfLink;
            card.style.display = "none";
            pdfViewer.style.display = "block";
            message.style.display = "none";
            window.scrollTo({ top: 0, behavior: "smooth" });
          };
          pdfClose.onclick = function () {
            pdfViewer.style.display = "none";
            card.style.display = "block";
            pdfFrame.src = "";
            window.scrollTo({ top: 0, behavior: "smooth" });
          };
        } else {
          btnPdf.style.display = "none";
        }

        message.style.display = "none";
        card.style.display = "block";

      } catch (error) {
        console.error(error);
        message.innerHTML = "Error al cargar la credencial: " + error.message;
      }
    }

    cargarCredencial();
  </script>

</body>
</html>
