<script>
  async function cargarCredencial() {
    const params = new URLSearchParams(window.location.search);
    const codigo = params.get("c");

    const message = document.getElementById("message");
    const card = document.getElementById("card");
    const pdfViewer = document.getElementById("pdfViewer");
    const btnPdf = document.getElementById("btnPdf");
    const pdfFrame = document.getElementById("pdfFrame");
    const pdfOpenNew = document.getElementById("pdfOpenNew");
    const pdfClose = document.getElementById("pdfClose");

    if (!codigo) {
      message.innerHTML = "No se encontró código de credencial.";
      return;
    }

    try {
      const [respPolizas, respAseguradoras] = await Promise.all([
        fetch("/data/auto.json"),
        fetch("/data/aseguradoras-auto.json")
      ]);

      const polizas = await respPolizas.json();
      const aseguradoras = await respAseguradoras.json();

      const poliza = polizas[codigo];

      if (!poliza) {
        message.innerHTML = "Credencial no encontrada.";
        return;
      }

      const aseguradora = aseguradoras[poliza.aseguradora_id];

      if (!aseguradora) {
        message.innerHTML = "Aseguradora no configurada.";
        return;
      }

      // 🔥 BOTÓN WALLET (YA CORRECTO)
      document.getElementById("btnWallet").href =
        "https://tactika-wallet-api.vercel.app/api/wallet/auto/" + codigo;

      // 🔹 DATOS
      document.getElementById("nombreAseguradora").innerHTML = aseguradora.nombre;
      document.getElementById("logoAseguradora").src = aseguradora.logo;
      document.getElementById("vigencia").innerHTML = poliza.vigencia_texto || poliza.vigencia || "";
      document.getElementById("contratante").innerHTML = poliza.contratante || "";
      document.getElementById("poliza").innerHTML = poliza.poliza || "";
      document.getElementById("vehiculo").innerHTML = poliza.vehiculo || "";
      document.getElementById("color").innerHTML = poliza.color || "";
      document.getElementById("serie").innerHTML = poliza.serie || "";
      document.getElementById("telefonoTexto").innerHTML = aseguradora.telefono_siniestros || "";
      document.getElementById("btnTelefono").href = "tel:" + (aseguradora.telefonolink || "");

      // 🔹 PDF
      const pdfLink = poliza.pdf_url || poliza.pdf || poliza.pdf_externo_url || "";

      if (pdfLink) {
        pdfOpenNew.href = pdfLink;

        btnPdf.addEventListener("click", function () {
          pdfFrame.src = pdfLink;
          card.style.display = "none";
          pdfViewer.style.display = "block";
          message.style.display = "none";
          window.scrollTo({ top: 0, behavior: "smooth" });
        });

        pdfClose.addEventListener("click", function () {
          pdfViewer.style.display = "none";
          card.style.display = "block";
          pdfFrame.src = "";
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      } else {
        btnPdf.style.display = "none";
      }

      message.style.display = "none";
      card.style.display = "block";

    } catch (error) {
      console.error(error);
      message.innerHTML = "Error al cargar la credencial: " + error.message;
    }
  }

  cargarCredencial();
</script>
