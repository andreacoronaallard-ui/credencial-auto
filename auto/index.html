<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Seguro Auto" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1F2A23" />

  <link rel="icon" href="https://credencial.tactika.mx/assets/logo-tactikatik.png" />
  <link rel="apple-touch-icon" href="https://credencial.tactika.mx/assets/logo-tactikatik.png" />

  <title>Credencial Seguro Auto</title>

  <meta property="og:title" content="Credencial Seguro Auto" />
  <meta property="og:description" content="Accede a tu credencial digital de seguro de auto con Tactika." />
  <meta property="og:image" content="https://credencial.tactika.mx/preview-tactika-auto.jpg" />
  <meta property="og:url" content="https://credencial.tactika.mx/auto/" />
  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Credencial Seguro Auto" />
  <meta name="twitter:description" content="Accede a tu credencial digital de seguro de auto con Tactika." />
  <meta name="twitter:image" content="https://credencial.tactika.mx/preview-tactika-auto.jpg" />

  <style>
    :root {
      --bg: #eef0ea;
      --green-deep: #1F2A23;
      --green: #4A5E4A;
      --green-soft: #647564;
      --beige: #F0EADA;
      --text-dark: #243026;
      --white: #ffffff;
      --shadow: 0 20px 45px rgba(24, 33, 27, 0.16);
      --shadow-soft: 0 10px 24px rgba(24, 33, 27, 0.10);
      --wa: #25D366;
      --border-soft: rgba(255,255,255,0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Avenir Next", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.45), transparent 35%),
        linear-gradient(180deg, #eef1eb 0%, #dfe5dd 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 18px max(18px, env(safe-area-inset-bottom));
      color: var(--white);
    }

    .phone {
      width: 100%;
      max-width: 440px;
    }

    .card {
      display: none;
      overflow: hidden;
      border-radius: 30px;
      background: linear-gradient(180deg, #223027 0%, #304036 100%);
      box-shadow: var(--shadow);
      border: 1px solid var(--border-soft);
      backdrop-filter: blur(4px);
    }

    .hero {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #314238;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(20, 28, 23, 0.08) 0%,
        rgba(20, 28, 23, 0.18) 40%,
        rgba(20, 28, 23, 0.52) 100%
      );
    }

    .top-bar {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 16px 18px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      z-index: 2;
    }

    .brand-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(16, 23, 19, 0.34);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .brand-chip img {
      width: 18px;
      height: 18px;
      object-fit: contain;
      display: block;
    }

    .brand-chip span {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
      color: #fff;
    }

    .vigencia-chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(16, 23, 19, 0.34);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.12);
      font-size: 11px;
      font-weight: 600;
      color: #fff;
      text-align: right;
      max-width: 155px;
      line-height: 1.25;
    }

    .hero-info {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      padding: 0 22px 22px;
    }

    .vehiculo {
      margin: 0;
      font-size: clamp(26px, 6vw, 34px);
      line-height: 1.04;
      font-weight: 700;
      letter-spacing: 0.2px;
      text-transform: uppercase;
      text-shadow: 0 2px 12px rgba(0,0,0,0.18);
    }

    .meta-row {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.16);
      backdrop-filter: blur(10px);
      font-size: 12px;
      font-weight: 600;
      color: #fff;
    }

    .content {
      padding: 22px 22px 24px;
      background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.00) 100%);
    }

    .info-panel {
      background: var(--beige);
      color: var(--text-dark);
      border-radius: 22px;
      padding: 18px 18px 16px;
      box-shadow: var(--shadow-soft);
    }

    .info-grid {
      display: grid;
      gap: 14px;
    }

    .info-item {
      display: grid;
      gap: 4px;
    }

    .info-label {
      font-size: 12px;
      letter-spacing: 0.3px;
      opacity: 0.72;
      text-transform: uppercase;
      font-weight: 700;
    }

    .info-value {
      font-size: 17px;
      line-height: 1.25;
      font-weight: 600;
      word-break: break-word;
    }

    .buttons {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .btn,
    .btn-official-wallet {
      appearance: none;
      border: 0;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 58px;
      padding: 14px 18px;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
    }

    .btn:hover,
    .btn-official-wallet:hover {
      transform: translateY(-1px);
    }

    .btn-call {
      background: var(--beige);
      color: var(--green-deep);
      box-shadow: var(--shadow-soft);
    }

    .btn-pdf {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1.5px solid rgba(255,255,255,0.14);
    }

    .btn-whatsapp {
      background: var(--wa);
      color: #fff;
      box-shadow: 0 12px 24px rgba(37, 211, 102, 0.26);
    }

    .btn-official-wallet {
      min-height: auto;
      padding: 0;
      background: transparent;
      box-shadow: none;
      justify-content: center;
      margin-top: 4px;
    }

    .btn-official-wallet img {
      height: 48px;
      display: block;
      margin: 0 auto;
    }

    .message {
      padding: 42px 24px;
      text-align: center;
      font-size: 18px;
      color: var(--green-deep);
      background: rgba(255,255,255,0.72);
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
    }

    .pdf-viewer {
      display: none;
      background: #ffffff;
      color: #111;
      border-radius: 30px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 1px solid rgba(0,0,0,0.06);
    }

    .pdf-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 16px 18px;
      background: var(--green-deep);
      color: #fff;
    }

    .pdf-title {
      font-size: 17px;
      font-weight: 700;
    }

    .pdf-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .pdf-btn {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      font-family: inherit;
    }

    .pdf-btn-open {
      background: #fff;
      color: var(--green-deep);
    }

    .pdf-btn-close {
      background: rgba(255,255,255,0.14);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
    }

    .pdf-frame-wrap {
      height: calc(100vh - 160px);
      min-height: 620px;
      background: #f5f5f5;
    }

    .pdf-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #fff;
    }

    @media (max-width: 380px) {
      .hero-info {
        padding: 0 18px 18px;
      }

      .content {
        padding: 18px 18px 22px;
      }

      .vehiculo {
        font-size: 24px;
      }

      .btn {
        font-size: 16px;
      }

      .info-value {
        font-size: 16px;
      }

      .btn-official-wallet img {
        height: 44px;
      }
    }
  </style>
</head>
<body>

  <div class="phone">

    <div class="message" id="message">Cargando credencial...</div>

    <div class="card" id="card">

      <div class="hero">
        <img src="https://credencial.tactika.mx/preview-tactika-auto.jpg" alt="Preview credencial" />
        <div class="hero-overlay"></div>

        <div class="top-bar">
          <div class="brand-chip">
            <img src="https://credencial.tactika.mx/assets/logo-tactikaverde.png" alt="Tactika" />
            <span>Tactika</span>
          </div>
          <div class="vigencia-chip" id="vigenciaChip"></div>
        </div>

        <div class="hero-info">
          <h1 class="vehiculo" id="vehiculo"></h1>
          <div class="meta-row">
            <div class="meta-pill" id="aseguradora"></div>
            <div class="meta-pill">Seguro Auto</div>
          </div>
        </div>
      </div>

      <div class="content">
        <div class="info-panel">
          <div class="info-grid">
            <div class="info-item">
              <div class="info-label">Contratante</div>
              <div class="info-value" id="contratante"></div>
            </div>

            <div class="info-item">
              <div class="info-label">Póliza</div>
              <div class="info-value" id="poliza"></div>
            </div>

            <div class="info-item">
              <div class="info-label">Vigencia</div>
              <div class="info-value" id="vigencia"></div>
            </div>

            <div class="info-item">
              <div class="info-label">Serie</div>
              <div class="info-value" id="serie"></div>
            </div>

            <div class="info-item">
              <div class="info-label">Color</div>
              <div class="info-value" id="color"></div>
            </div>

            <div class="info-item">
              <div class="info-label">Siniestros</div>
              <div class="info-value" id="telefonoTexto"></div>
            </div>
          </div>
        </div>

        <div class="buttons">
          <a class="btn btn-call" id="btnTelefono" href="#">📞 Llamar a siniestros</a>
          <button class="btn btn-pdf" id="btnPdf" type="button">📄 Ver póliza completa</button>
          <a class="btn btn-whatsapp" href="https://wa.me/message/HWHNU3PT7TYXG1" target="_blank" rel="noopener noreferrer">💬 Contacta a tu agente</a>

          <a class="btn-official-wallet" id="btnGoogleWalletOfficial" target="_blank" rel="noopener noreferrer">
            <img
              src="https://developers.google.com/wallet/images/add-to-google-wallet-button.png"
              alt="Add to Google Wallet"
            />
          </a>
        </div>
      </div>

    </div>

    <div class="pdf-viewer" id="pdfViewer">
      <div class="pdf-header">
        <div class="pdf-title">Póliza completa</div>
        <div class="pdf-actions">
          <a class="pdf-btn pdf-btn-open" id="pdfOpenNew" href="#" target="_blank" rel="noopener noreferrer">Abrir aparte</a>
          <button class="pdf-btn pdf-btn-close" id="pdfClose" type="button">Cerrar</button>
        </div>
      </div>
      <div class="pdf-frame-wrap">
        <iframe class="pdf-frame" id="pdfFrame" src=""></iframe>
      </div>
    </div>

  </div>

  <script>
    async function cargarCredencial() {
      const params = new URLSearchParams(window.location.search);
      const codigo = params.get("c");

      const message = document.getElementById("message");
      const card = document.getElementById("card");
      const pdfViewer = document.getElementById("pdfViewer");
      const btnPdf = document.getElementById("btnPdf");
      const pdfFrame = document.getElementById("pdfFrame");
      const pdfOpenNew = document.getElementById("pdfOpenNew");
      const pdfClose = document.getElementById("pdfClose");
      const btnTelefono = document.getElementById("btnTelefono");
      const btnGoogleWalletOfficial = document.getElementById("btnGoogleWalletOfficial");

      if (!codigo) {
        message.innerHTML = "No se encontró código de credencial.";
        return;
      }

      try {
        const [respPolizas, respAseguradoras] = await Promise.all([
          fetch("https://credencial.tactika.mx/data/auto.json"),
          fetch("https://credencial.tactika.mx/data/aseguradoras-auto.json")
        ]);

        if (!respPolizas.ok) throw new Error("No se pudo leer auto.json");
        if (!respAseguradoras.ok) throw new Error("No se pudo leer aseguradoras-auto.json");

        const polizas = await respPolizas.json();
        const aseguradoras = await respAseguradoras.json();

        const poliza = polizas[codigo];
        if (!poliza) {
          message.innerHTML = "Credencial no encontrada.";
          return;
        }

        const aseguradora = aseguradoras[poliza.aseguradora_id];
        if (!aseguradora) {
          message.innerHTML = "Aseguradora no configurada.";
          return;
        }

        document.getElementById("vehiculo").innerText = poliza.vehiculo || "";
        document.getElementById("aseguradora").innerText = aseguradora.nombre || "";
        document.getElementById("contratante").innerText = poliza.contratante || "";
        document.getElementById("poliza").innerText = poliza.poliza || "";
        document.getElementById("vigencia").innerText = poliza.vigencia_texto || "";
        document.getElementById("vigenciaChip").innerText = poliza.vigencia_texto || "";
        document.getElementById("serie").innerText = poliza.serie || "";
        document.getElementById("color").innerText = (poliza.color || "").trim();
        document.getElementById("telefonoTexto").innerText = aseguradora.telefono_siniestros || "";

        btnTelefono.href = "tel:" + (aseguradora.telefonolink || "");
        btnPdf.href = poliza.pdf_url || "#";

        const walletUrl = `https://tactika-wallet-api.vercel.app/api/wallet/auto/${poliza.id}`;

        if (btnGoogleWalletOfficial) {
          btnGoogleWalletOfficial.href = walletUrl;
        }

        const pdfLink = poliza.pdf_url || "";

        if (pdfLink) {
          pdfOpenNew.href = pdfLink;

          btnPdf.onclick = function () {
            pdfFrame.src = pdfLink;
            card.style.display = "none";
            pdfViewer.style.display = "block";
            message.style.display = "none";
            window.scrollTo({ top: 0, behavior: "smooth" });
          };

          pdfClose.onclick = function () {
            pdfViewer.style.display = "none";
            card.style.display = "block";
            pdfFrame.src = "";
            window.scrollTo({ top: 0, behavior: "smooth" });
          };
        } else {
          btnPdf.style.display = "none";
        }

        message.style.display = "none";
        card.style.display = "block";

      } catch (error) {
        console.error(error);
        message.innerHTML = "Error al cargar la credencial: " + error.message;
      }
    }

    cargarCredencial();
  </script>

</body>
</html>
