<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Credencial Seguro Auto</title>

  <!-- Open Graph -->
  <meta property="og:title" content="Credencial Seguro Auto" />
  <meta property="og:description" content="Accede a tu credencial digital de seguro de auto con Tactika." />
  <meta property="og:image" content="https://credencial.tactika.mx/preview-tactika-auto.png" />
  <meta property="og:url" content="https://credencial.tactika.mx/" />
  <meta property="og:type" content="website" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Credencial Seguro Auto" />
  <meta name="twitter:description" content="Accede a tu credencial digital de seguro de auto con Tactika." />
  <meta name="twitter:image" content="https://credencial.tactika.mx/preview-tactika-auto.png" />

  <!-- App mode -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#4A5E4A" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #eef0ea;
    }

    .card {
      max-width: 420px;
      margin: 20px auto;
      background: #4A5E4A;
      border-radius: 20px;
      color: #fff;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .header {
      padding: 20px;
      display: flex;
      justify-content: space-between;
    }

    .section {
      background: #F0EADA;
      color: #2C3228;
      padding: 20px;
    }

    .title {
      font-size: 22px;
      font-weight: bold;
    }

    .big {
      font-size: 26px;
      font-weight: bold;
      margin-top: 10px;
    }

    .btn {
      display: block;
      margin: 12px 0;
      padding: 14px;
      text-align: center;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn-call {
      background: #4A5E4A;
      color: white;
    }

    .btn-pdf {
      border: 1px solid #ccc;
      color: #2C3228;
      background: #fff;
    }

    .btn-wa {
      background: #25D366;
      color: white;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="header">
    <div>
      <div id="aseguradora"></div>
    </div>
    <div id="vigencia"></div>
  </div>

  <div class="section">
    <div>Contratante:</div>
    <div class="title" id="contratante"></div>

    <div style="margin-top:15px;">Póliza:</div>
    <div class="title" id="poliza"></div>

    <hr>

    <div class="big" id="vehiculo"></div>

    <div>Color: <b id="color"></b></div>
    <div>No. serie: <b id="serie"></b></div>

    <hr>

    <div>Siniestros</div>
    <div class="big" id="telefono"></div>

    <a id="btnTelefono" class="btn btn-call">📞 Llamar a siniestros</a>
    <a id="btnPdf" class="btn btn-pdf">📄 Ver póliza completa</a>
    <a href="https://wa.me/message/HWHNU3PT7TYXG1" class="btn btn-wa">💬 Contacta a tu agente</a>

  </div>
</div>

<script>
function getParam(param, defaultValue = "") {
  const urlParams = new URLSearchParams(window.location.search);
  return urlParams.get(param) || defaultValue;
}

document.getElementById("aseguradora").innerText = getParam("aseguradora");
document.getElementById("vigencia").innerHTML = getParam("vigencia");
document.getElementById("contratante").innerText = getParam("contratante");
document.getElementById("poliza").innerText = getParam("poliza");
document.getElementById("vehiculo").innerText = getParam("vehiculo");
document.getElementById("color").innerText = getParam("color");
document.getElementById("serie").innerText = getParam("serie");
document.getElementById("telefono").innerText = getParam("telefono");

document.getElementById("btnTelefono").href = "tel:" + getParam("telefonolink");
document.getElementById("btnPdf").href = getParam("pdf");
</script>

</body>
</html>
