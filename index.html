<body>
  <div class="phone">
    <div class="card">
      <div class="pattern"></div>

      <div class="top">

        </div>

        <div class="logo-wrap">
          <img id="logoAseguradora" alt="Logo aseguradora" src="" />
        </div>

      <div class="main">
        <div class="label">Contratante:</div>
        <div class="value-lg" id="contratante">LUCAS ALEXANDER WALLER MORENO</div>

        <div class="value-md" id="poliza">1290599162</div>

        <div class="vehicle-title" id="vehiculo">NISSAN VERSA ADVANCE 2022</div>

            <div class="v" id="color">Platino</div>
          </div>

            <div class="k">No. serie:</div>

        <div class="call-title">Siniestros</div>
        <div class="call-phone" id="telefonoTexto">800 288 6700</div>

        <div class="buttons">
          <a class="btn btn-call" id="btnTelefono" href="tel:8002886700">📞 Llamar a siniestros</a>
          <a class="btn btn-pdf" id="btnPdf" href="#" target="_blank" rel="noopener noreferrer">📄 Ver póliza completa</a>
          <a class="btn btn-whatsapp" id="btnWhatsapp" href="https://wa.me/message/HWHNU3PT7TYXG1" target="_blank" rel="noopener noreferrer">💬 Contacta a tu agente</a>
        </div>

    </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const getParam = (name, fallback = "") => {
      const value = params.get(name);
      return value && value.trim() ? value.trim() : fallback;
    };

    const setText = (id, value) => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = value;
    };

    const setHref = (id, value) => {
      const el = document.getElementById(id);
      if (el) el.href = value;
    };

    const tactikaLogo = getParam("tactikalogo", "https://lh3.googleusercontent.com/d/1MhAK4zeeyNvabPIsvb0THRmyROdWa9dt");
    const logo = getParam("logo", "");
    const appicon = getParam("appicon", tactikaLogo);
    const apptitle = getParam("apptitle", "Seguro Auto");
    const aseguradora = getParam("aseguradora", "Qualitas Compañía de Seguros");
    const vigencia = getParam("vigencia", "08 JUL 2025<br>– 08 JUL 2026").replace(/\n/g, "<br>");
    const contratante = getParam("contratante", "LUCAS ALEXANDER WALLER MORENO");
    const poliza = getParam("poliza", "1290599162");
    const pdf = getParam("pdf", "#");
    const vehiculo = getParam("vehiculo", "NISSAN VERSA ADVANCE 2022");
    const color = getParam("color", "Platino");
    const serie = getParam("serie", "3N1CN8AE2NL848935");
    const telefono = getParam("telefono", "800 288 6700");
    const telefonoLink = getParam("telefonolink", telefono.replace(/[^\d+]/g, ""));

    setText("nombreAseguradora", aseguradora);
    setText("vigencia", vigencia);
    setText("contratante", contratante);
    setText("poliza", poliza);
    setText("vehiculo", vehiculo);
    setText("color", color);
    setText("serie", serie);
    setText("telefonoTexto", telefono);
    setHref("btnTelefono", `tel:${telefonoLink}`);
    setHref("btnPdf", pdf);

    const tactikaLogoEl = document.getElementById("tactikaLogo");
    const tactikaLogoWrap = document.getElementById("tactikaLogoWrap");
    const tactikaTextoFallback = document.getElementById("tactikaTextoFallback");

    if (tactikaLogo) {
      tactikaLogoEl.src = tactikaLogo;
      tactikaLogoWrap.style.display = "block";
      tactikaTextoFallback.style.display = "none";
    }

    document.title = apptitle;
    const appTitleMeta = document.querySelector('meta[name="apple-mobile-web-app-title"]');
    if (appTitleMeta) appTitleMeta.setAttribute('content', apptitle);
    const appIconEl = document.getElementById("appIcon");
    const appleTouchIconEl = document.getElementById("appleTouchIcon");
    if (appicon) {
      appIconEl.href = appicon;
      appleTouchIconEl.href = appicon;
    }

    const logoEl = document.getElementById("logoAseguradora");
    if (logo) {
      logoEl.src = logo;
    } else {
      logoEl.style.display = "none";
    }

    const btnPdf = document.getElementById("btnPdf");
    if (!pdf || pdf === "#") {
      btnPdf.style.opacity = "0.45";
      btnPdf.style.pointerEvents = "none";
      btnPdf.textContent = "📄 Póliza no disponible";
    }
  </script>
